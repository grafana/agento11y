packages:
  - 'js'
  - 'js-core'
  - 'plugins/*'

overrides:
  protobufjs: 7.6.5
  lodash: 4.18.1
  lodash-es: 4.18.1
  '@mikro-orm/knex': 6.6.14
  fast-uri: 3.1.4
  hono: 4.12.27
  tar: 7.5.19
  ws: 8.21.0
  '@tootallnate/once': 2.0.1
  undici: 7.28.0
  fast-xml-builder: 1.1.7
  '@hono/node-server': 2.0.10
  ip-address: 10.1.1
  qs: 6.15.2
  'form-data@<2.5.6': 2.5.6
  'brace-expansion@5': 5.0.7
  'uuid@<11.1.1': 11.1.1
  'uuid@13.0.0': 13.0.2

# Security Hardening Week package-manager policy.
minimumReleaseAge: 4320
trustPolicy: no-downgrade
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  esbuild: true
  koffi: true
  protobufjs: true
  sqlite3: true
  tree-sitter: true
minimumReleaseAgeExclude:
  # Renovate security update: pnpm@11.8.0
  - pnpm@11.8.0
  # Renovate security update: @hono/node-server@2.0.10
  - "@hono/node-server@2.0.10"
